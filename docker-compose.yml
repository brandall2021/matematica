name: matematica

services:
  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: matematica-qdrant
    restart: always
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - matematica-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: matematica-backend
    restart: always
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_USERNAME: ${DB_USER:-brandall}
      DB_PASSWORD: ${DB_PASSWORD:-Hansol1974+}
      DB_URL: jdbc:postgresql://${DB_HOST:-186.153.163.188}:5432/${DB_NAME:-matematica}
      QDRANT_HOST: qdrant
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      JWT_SECRET: ${JWT_SECRET:-}
      EMBEDDING_TYPE: ${EMBEDDING_TYPE:-openai}
    volumes:
      - ${BACKEND_LOGS:-./logs}:/app/logs
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - matematica-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: matematica-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "8008:8008"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`sistemas-matematica-6ubzi2-f19714-200-58-102-223.sslip.io`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.services.frontend.loadbalancer.server.port=8008"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
    networks:
      - matematica-net
      - dokploy-network

  ollama:
    image: ollama/ollama:latest
    container_name: matematica-ollama
    restart: always
    profiles:
      - ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - matematica-net

volumes:
  qdrant_data:
    name: matematica-qdrant-data
  ollama_data:
    name: matematica-ollama-data

networks:
  matematica-net:
    name: matematica-network
    driver: bridge
  dokploy-network:
    external: true
    name: dokploy-network
